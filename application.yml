# Lavalink v4 node configuration for Miri's music module.
#
# The bot connects with these (see src/modules/music/config.py):
#   LAVALINK_URI      -> http://<host>:<server.port>   (default http://localhost:2333)
#   LAVALINK_PASSWORD -> lavalink.server.password      (default "youshallnotpass")
# Keep server.port + lavalink.server.password in sync with docker-compose.yml.
#
# Sources: YouTube is provided by the youtube-plugin (the builtin is deprecated);
# SoundCloud is the bot's reliable DEFAULT_SOURCE. Spotify resolves as metadata only
# (track names get searched on a playable source) via LavaSrc — fill in Spotify
# credentials below (or set the SPOTIFY_CLIENT_ID / SPOTIFY_CLIENT_SECRET env vars).

server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.3"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      # youtube is handled by the youtube-plugin below, not the (deprecated) builtin.
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED
  lavasrc:
    sources:
      # Spotify/Apple/Deezer return metadata that is searched on a playable source.
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6

logging:
  level:
    root: INFO
    lavalink: INFO
